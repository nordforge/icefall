name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate tag matches Cargo.toml
        id: version
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

          # Detect pre-release
          if echo "$TAG_VERSION" | grep -qE '(alpha|beta|rc|nightly)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.artifact_name }})
    needs: validate-tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: x86_64-linux
          - target: aarch64-unknown-linux-musl
            artifact_name: aarch64-linux

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --locked

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache Cargo artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build dashboard
        run: cd dashboard && bun install --frozen-lockfile && bun run build

      - name: Build binary
        run: cross build --release --target ${{ matrix.target }}
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Package release tarball
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          ARTIFACT="icefall-v${VERSION}-${{ matrix.artifact_name }}"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/icefall" staging/
          cp -r dashboard/dist staging/dashboard
          cd staging
          tar czf "../${ARTIFACT}.tar.gz" .
          cd ..
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.artifact_name }}
          path: |
            icefall-v*.tar.gz
            icefall-v*.tar.gz.sha256

  sign-and-release:
    name: Sign manifest & create release
    needs: [validate-tag, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install signing dependencies
        run: pip install pynacl

      - name: Build and sign manifest
        env:
          SIGNING_KEY_B64: ${{ secrets.ICEFALL_RELEASE_SIGNING_KEY }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
          REPO: ${{ github.repository }}
        run: python3 scripts/sign-release.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          prerelease: ${{ needs.validate-tag.outputs.prerelease == 'true' }}
          files: |
            artifacts/release-*/*.tar.gz
            artifacts/release-*/*.tar.gz.sha256
            icefall-v${{ needs.validate-tag.outputs.version }}-manifest.json
            icefall-v${{ needs.validate-tag.outputs.version }}-manifest.json.sig

version: 2

updates:
  # Rust (Cargo) dependencies
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(rust):"
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 10

  # Dashboard (npm/Bun) dependencies
  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(dashboard):"
    labels:
      - dependencies
      - dashboard
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(actions):"
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 5

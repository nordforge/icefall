# Ignored security advisories
#
# cargo-audit does not auto-read config files in v0.22.
# The --ignore flags are passed in .github/workflows/security-audit.yml.
# This file exists as documentation of why each advisory is ignored.
#
# RUSTSEC-2023-0071: Marvin Attack in `rsa` crate (severity: medium).
#   Transitive dependency from sqlx-mysql, which sqlx-macros-core depends on
#   unconditionally — so `rsa` is compiled regardless of enabled features.
#   We only ever open SQLite connections, so the vulnerable RSA decryption
#   path is never executed at runtime. No fixed version exists upstream.
